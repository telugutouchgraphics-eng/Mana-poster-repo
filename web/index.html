  <style>
    :root {
      --app-primary: #6d28d9;
      --app-primary-dark: #4c1d95;
      --app-primary-light: #9333ea;
      --app-mint: #ddd6fe;
      --app-orange: #06b6d4;
      --app-yellow: #22d3ee;
      --app-pink: #c084fc;
      --app-sky: #3b82f6;
      --app-ink: #172033;
      --app-muted: #52607a;
      --app-border: #ddd6fe;
      --app-page: #fbf7ff;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--app-page);
      font-family: "Noto Sans Telugu", "Nirmala UI", "Gautami", "Segoe UI", Arial, Helvetica, sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #shell-loader {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .shell-card {
      width: min(100%, 520px);
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 28px;
      box-sizing: border-box;
    }

    .shell-title {
      margin: 0 0 10px;
      color: #0f172a;
      font-size: 28px;
      font-weight: 800;
    }

    .shell-copy {
      margin: 0;
      color: #475569;
      font-size: 15px;
      line-height: 1.6;
    }

    .lang-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 180px;
      padding: 8px;
      background: #fff;
      border: 1px solid var(--app-border);
      border-radius: 12px;
      box-shadow: 0 16px 34px rgba(15, 23, 42, .18);
      display: none;
      z-index: 20;
    }

    .lang-menu.open {
      display: block;
    }

    .lang-option {
      width: 100%;
      min-height: 42px;
      border: 0;
      background: transparent;
      border-radius: 10px;
      text-align: left;
      padding: 0 12px;
      color: var(--app-ink);
      font-weight: 800;
      cursor: pointer;
    }

    .lang-option.active,
    .lang-option:hover {
      background: #f5f3ff;
      color: var(--app-primary-dark);
    }

    .public-section {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 34px clamp(18px, 4vw, 56px);
      box-sizing: border-box;
    }

    .public-banner-wrap {
      width: 100%;
      margin: 0;
      padding: 0 0 18px;
      box-sizing: border-box;
    }

    .public-banner {
      height: clamp(420px, 52vw, 760px);
      border-radius: 0;
      overflow: hidden;
      background:
        linear-gradient(135deg, #c084fc 0%, #60a5fa 42%, #22d3ee 100%);
      border-bottom: 1px solid var(--app-border);
      position: relative;
    }

    .public-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.14) 25%, transparent 25%) 0 0 / 44px 44px,
        linear-gradient(225deg, rgba(255,255,255,.14) 25%, transparent 25%) 0 0 / 44px 44px,
        linear-gradient(315deg, rgba(255,255,255,.14) 25%, transparent 25%) 0 0 / 44px 44px,
        linear-gradient(45deg, rgba(255,255,255,.14) 25%, transparent 25%) 0 0 / 44px 44px;
      pointer-events: none;
    }

    .public-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 1;
      display: block;
    }

    .public-banner-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      box-sizing: border-box;
      text-align: center;
      color: var(--app-primary-dark);
      font-weight: 900;
      font-size: clamp(24px, 4vw, 44px);
      line-height: 1.08;
    }

    .public-eyebrow {
      color: var(--app-orange);
      font-weight: 900;
      margin: 0 0 8px;
    }

    .public-title {
      margin: 0;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.02;
      font-weight: 900;
    }

    .public-subtitle {
      max-width: 980px;
      color: var(--app-muted);
      font-weight: 700;
      line-height: 1.55;
      font-size: 17px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .public-chip {
      border: 1px solid var(--app-border);
      background: #fff;
      color: var(--app-primary-dark);
      border-radius: 999px;
      padding: 12px 15px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, color .16s ease, border-color .16s ease;
    }

    .public-chip:hover {
      transform: translateY(-1px);
      border-color: var(--app-primary);
      box-shadow: 0 8px 18px rgba(15, 118, 110, .14);
    }

    .public-chip.active {
      background: linear-gradient(135deg, var(--app-primary-dark), var(--app-primary), var(--app-primary-light));
      color: #fff;
      border-color: var(--app-primary);
    }

    .category-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin-top: 22px;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .category-panel h3 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 900;
    }

    .category-panel p {
      margin: 0;
      color: var(--app-muted);
      font-weight: 700;
      line-height: 1.45;
    }

    .category-count {
      min-width: 110px;
      border-radius: 999px;
      padding: 16px 18px;
      background: linear-gradient(135deg, #7c3aed, #9333ea, #06b6d4);
      color: #fff;
      text-align: center;
      font-weight: 900;
    }

    .category-count span {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .public-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 22px;
    }

    .poster-card,
    .feature-card {
      background: transparent;
      border: 0;
      border-radius: 0;
      overflow: visible;
      box-shadow: none;
    }

    .poster-frame {
      height: 320px;
      background: linear-gradient(135deg, #d8b4fe, #93c5fd, #67e8f9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      box-sizing: border-box;
      border-radius: 18px;
    }

    .poster-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .empty-gallery {
      grid-column: 1 / -1;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      border: 1px dashed var(--app-primary);
      border-radius: 8px;
      background: #f5f3ff;
      color: var(--app-primary-dark);
      text-align: center;
      font-weight: 900;
      line-height: 1.45;
    }

    .poster-title,
    .feature-card {
      padding: 16px 4px 0;
      font-weight: 900;
    }

    .poster-title span {
      display: block;
      margin-bottom: 4px;
      color: var(--app-primary);
      font-size: 12px;
      text-transform: uppercase;
    }

    .feature-card p {
      color: var(--app-muted);
      font-weight: 700;
      line-height: 1.45;
    }

    .feature-card {
      min-height: 180px;
      padding: 28px 24px;
      border-radius: 24px;
    }

    .feature-card:nth-child(1) { background: linear-gradient(135deg, #e9d5ff 0%, #c084fc 100%); }
    .feature-card:nth-child(2) { background: linear-gradient(135deg, #dbeafe 0%, #93c5fd 100%); }
    .feature-card:nth-child(3) { background: linear-gradient(135deg, #ccfbf1 0%, #67e8f9 100%); }
    .feature-card:nth-child(4) { background: linear-gradient(135deg, #e0f2fe 0%, #7dd3fc 100%); }
    .feature-card:nth-child(5) { background: linear-gradient(135deg, #ede9fe 0%, #d8b4fe 100%); }

    .stats-band {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .stat-tile {
      border-radius: 20px;
      padding: 24px 20px;
      color: #111827;
      font-weight: 900;
      background: rgba(255,255,255,.7);
      border: 0;
    }

    .stat-tile:nth-child(1) {
      background: #ddd6fe;
      border-color: #a78bfa;
    }

    .stat-tile:nth-child(2) {
      background: #bfdbfe;
      border-color: #60a5fa;
    }

    .stat-tile:nth-child(3) {
      background: #a5f3fc;
      border-color: #22d3ee;
    }

    .stat-tile:nth-child(4) {
      background: #e9d5ff;
      border-color: #c084fc;
    }

    .stat-tile span {
      display: block;
      margin-top: 0;
      margin-bottom: 10px;
      color: var(--app-muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .flow-band {
      border-radius: 28px;
      padding: 30px;
      background: linear-gradient(135deg, #4c1d95, #7c3aed, #2563eb, #06b6d4);
      color: #fff;
      margin-top: 22px;
    }

    .flow-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .flow-step {
      border: 0;
      background: rgba(255, 255, 255, .14);
      border-radius: 20px;
      padding: 20px 18px;
      font-weight: 900;
    }

    .flow-step span {
      display: block;
      color: var(--app-yellow);
      margin-bottom: 8px;
    }

    .support-band {
      display: grid;
      grid-template-columns: 1.3fr .7fr;
      gap: 24px;
      border-radius: 28px;
      padding: 30px;
      background: linear-gradient(135deg, rgba(192,132,252,.78), rgba(147,197,253,.78), rgba(34,211,238,.72));
      border: 0;
      margin-top: 22px;
    }

    .support-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: start;
    }

    .support-pill {
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      border: 0;
      color: var(--app-primary-dark);
      padding: 12px 16px;
      font-weight: 900;
    }

    .install-band {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      align-items: center;
      margin-top: 22px;
      padding: 34px 30px;
      border-radius: 30px;
      background: linear-gradient(135deg, #c084fc, #8b5cf6, #3b82f6, #22d3ee);
      color: var(--app-ink);
    }

    .install-band h2 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.05;
      font-weight: 900;
    }

    .install-band p {
      margin: 0;
      max-width: 680px;
      color: var(--app-primary-dark);
      font-weight: 800;
      line-height: 1.45;
    }

    .public-footer {
      margin-top: 58px;
      padding: 42px 24px;
      background: linear-gradient(135deg, var(--app-primary-dark), var(--app-primary));
      color: #fff;
    }

    .footer-inner {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
    }

    .footer-links a {
      color: #e2e8f0;
      font-weight: 800;
      text-decoration: none;
    }

    .download-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--app-primary-dark), var(--app-primary), #0ea5e9);
      color: #fff;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }

    .public-page {
      background:
        radial-gradient(circle at 12% 12%, rgba(244, 114, 182, .22), transparent 18%),
        radial-gradient(circle at 88% 10%, rgba(96, 165, 250, .26), transparent 20%),
        radial-gradient(circle at 84% 62%, rgba(34, 211, 238, .18), transparent 20%),
        linear-gradient(180deg, #edf4ff 0%, #dff1ff 34%, #e2e7ff 68%, #eef2ff 100%);
      overflow-x: hidden;
    }

    .public-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 24px;
      padding: 20px clamp(18px, 4vw, 56px);
      background: transparent;
      box-shadow: none;
      border-bottom: 0;
      max-width: 1320px;
      width: 100%;
      margin: 0 auto;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .public-logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
    }

    .public-brand {
      color: #2d1b69;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.4;
    }

    .public-brand strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      color: #ff2f74;
    }

    .public-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 34px;
    }

    .public-link {
      color: #2d1b69;
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
      position: relative;
    }

    .public-link.active::after,
    .public-link:hover::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -10px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4d94, #ff7a18);
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-left: 0;
    }

    .public-button,
    .download-link {
      min-height: 58px;
      padding: 0 28px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff5b98 0%, #ff2f74 100%);
      box-shadow: 0 18px 34px rgba(255, 47, 116, .24);
      color: #fff;
      font-weight: 900;
    }

    .lang-trigger {
      min-height: 50px;
      padding: 0 16px;
      background: #fff;
      border: 1px solid rgba(125, 86, 255, .16);
      color: #2d1b69;
      box-shadow: 0 10px 24px rgba(79, 70, 229, .12);
    }

    .hero-shell {
      position: relative;
      padding: 8px clamp(18px, 4vw, 56px) 0;
      max-width: 1320px;
      margin: 0 auto;
    }

    .hero-shell::before,
    .hero-shell::after {
      content: "";
      position: absolute;
      z-index: 0;
      pointer-events: none;
    }

    .hero-shell::before {
      width: 200px;
      height: 200px;
      top: -42px;
      left: -74px;
      background: linear-gradient(135deg, #ff62ad, #ff7a9b);
      border-bottom-right-radius: 170px;
    }

    .hero-shell::after {
      width: 170px;
      height: 170px;
      top: -34px;
      right: -54px;
      background: linear-gradient(135deg, #7dd3fc, #60a5fa);
      border-bottom-left-radius: 130px;
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.05fr .78fr .95fr;
      gap: 28px;
      align-items: end;
    }

    .hero-copy {
      padding: 32px 0 42px;
      text-align: left;
      max-width: 540px;
      margin: 0;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(48px, 5vw, 82px);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 900;
      color: #1e1b4b;
      text-shadow: 0 8px 24px rgba(255, 255, 255, .2);
    }

    .hero-title .accent {
      color: #ff2f74;
    }

    .hero-desc {
      margin: 24px 0 0;
      max-width: 520px;
      font-size: 22px;
      line-height: 1.65;
      color: #334155;
      font-weight: 800;
    }

    .hero-desc .accent {
      color: #ff2f74;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 28px;
      justify-content: flex-start;
    }

    .hero-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 0 28px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .94);
      color: #2d1b69;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 14px 30px rgba(45, 27, 105, .12);
    }

    .hero-love {
      margin-top: 24px;
      color: #1e1b4b;
      font-size: 24px;
      font-weight: 800;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .avatar-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .avatar-dot {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: linear-gradient(135deg, #c084fc, #60a5fa, #22d3ee);
      box-shadow: 0 8px 20px rgba(45, 27, 105, .18);
    }

    .avatar-dot:nth-child(2) { background: linear-gradient(135deg, #fb7185, #facc15); }
    .avatar-dot:nth-child(3) { background: linear-gradient(135deg, #60a5fa, #22d3ee); }
    .avatar-dot:nth-child(4) { background: linear-gradient(135deg, #a78bfa, #f472b6); }

    .hero-phone-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 640px;
    }

    .hero-phone-wrap::before {
      content: "";
      position: absolute;
      inset: 110px 20px 70px 20px;
      background: radial-gradient(circle, rgba(244, 114, 182, .24), transparent 68%);
      z-index: 0;
    }

    .hero-phone {
      position: relative;
      z-index: 2;
      width: min(360px, 100%);
      aspect-ratio: 0.56;
      border-radius: 44px;
      padding: 14px;
      background: #111827;
      box-shadow: 0 30px 60px rgba(15, 23, 42, .28);
      transform: rotate(-6deg);
    }

    .hero-phone::before {
      content: "";
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 24px;
      border-radius: 999px;
      background: #0f172a;
      z-index: 3;
    }

    .hero-phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 32px;
      overflow: hidden;
      background: linear-gradient(180deg, #fff 0%, #f8fbff 100%);
      position: relative;
    }

    .hero-phone-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 14px;
      color: #1e1b4b;
      font-size: 14px;
      font-weight: 900;
    }

    .hero-device-screen {
      margin: 0 16px;
      height: 55%;
      border-radius: 26px;
      background: linear-gradient(135deg, #f3e8ff, #dbeafe);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(99, 102, 241, .08);
    }

    .hero-device-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-device-screen span {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      color: #4c1d95;

      var firestoreDocUrl = 'https://firestore.googleapis.com/v1/projects/mana-poster-ap/databases/(default)/documents/landingSite/main';

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, function (char) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
          }[char];
        });
      }

      function parseFirestoreValue(value) {
        if (!value || typeof value !== 'object') return null;
        if ('stringValue' in value) return value.stringValue || '';
        if ('integerValue' in value) return Number(value.integerValue || 0);
        if ('doubleValue' in value) return Number(value.doubleValue || 0);
        if ('booleanValue' in value) return value.booleanValue === true;
        if ('timestampValue' in value) return value.timestampValue || '';
        if ('arrayValue' in value) {
          return (value.arrayValue.values || []).map(parseFirestoreValue);
        }
        if ('mapValue' in value) {
          var output = {};
          var fields = value.mapValue.fields || {};
          Object.keys(fields).forEach(function (key) {
            output[key] = parseFirestoreValue(fields[key]);
          });
          return output;
        }
        return null;
      }

      function parseFirestoreDocument(doc) {
        var output = {};
        var fields = doc && doc.fields ? doc.fields : {};
        Object.keys(fields).forEach(function (key) {
          output[key] = parseFirestoreValue(fields[key]);
        });
        return output;
      }

      function getText(key) {
        var bundle = translations[selectedLanguage] || translations.english;
        return bundle[key] || translations.english[key] || '';

      function getCategoryText(categoryId) {

      function updateStaticCopy() {

          button.classList.toggle('active', lang === selectedLanguage);

        });
      }

      function postersForCategory(categoryId) {
        var posters = landingContent.posters || [];
        if (categoryId === 'all') {
          return posters.slice().sort(function (a, b) {
            return (a.sortOrder || 0) - (b.sortOrder || 0);
          });
        }
        return posters.filter(function (poster) {
          return poster.categoryId === categoryId;
        }).sort(function (a, b) {
          return (a.sortOrder || 0) - (b.sortOrder || 0);
        });
      }

      function updateBanner() {
        var imageUrl = (landingContent.bannerImageUrl || '').trim();
        var sectionMediaUrl = (landingContent.sectionMediaUrl || '').trim();
        var sectionMediaType = (landingContent.sectionMediaType || '').trim();

      function renderPosters(categoryId) {
        var title = document.getElementById('poster-section-title');
        var copy = document.getElementById('poster-section-copy');
        var grid = document.getElementById('poster-grid');
        var panelTitle = document.getElementById('category-panel-title');
        var panelCopy = document.getElementById('category-panel-copy');
        var panelCount = document.getElementById('category-panel-count');
        if (!title || !copy || !grid) return;
        var details = getCategoryText(categoryId);
        var label = details[0] || getCategoryText('all')[0];
        var posters = postersForCategory(categoryId);
        title.textContent = label;
        copy.textContent = details[1];
        if (panelTitle) panelTitle.textContent = details[0];

        if (panelCount) panelCount.textContent = String(posters.length);
        if (!posters.length) {

          return;

        grid.innerHTML = posters.map(function (poster) {

            '" alt="' + escapeHtml(posterTitle) +

      function loadLandingContent() {

          });
          chip.classList.add('active');
          renderPosters(chip.getAttribute('data-category-id') || 'all');
        });
      });

      var langTrigger = document.getElementById('lang-trigger');
      var langMenu = document.getElementById('lang-menu');
      if (langTrigger && langMenu) {
        langTrigger.addEventListener('click', function () {
          langMenu.classList.toggle('open');
        });
        document.addEventListener('click', function (event) {
          if (!langMenu.contains(event.target) && event.target !== langTrigger) {
            langMenu.classList.remove('open');
          }
        });
      }

      Array.prototype.forEach.call(document.querySelectorAll('.lang-option'), function (button) {
        button.addEventListener('click', function () {
          selectedLanguage = button.getAttribute('data-lang') || 'telugu';
          localStorage.setItem('manaPosterLandingLanguage', selectedLanguage);
          updateStaticCopy();
          updateCategoryCounts();
          renderPosters(activeCategoryId());
          if (langMenu) langMenu.classList.remove('open');
        });
      });

      Array.prototype.forEach.call(document.querySelectorAll('[data-scroll-target]'), function (button) {
        button.addEventListener('click', function () {
          var target = document.getElementById(button.getAttribute('data-scroll-target') || '');
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      document.addEventListener('click', function (event) {
        var action = event.target.closest ? event.target.closest('.poster-action') : null;
        if (!action) return;
        window.open(playStoreUrl, '_blank', 'noopener');
      });

      updateStaticCopy();
      updateCategoryCounts();
      renderPosters('all');
      loadLandingContent();
    })();
  </script>
</body>
</html>
